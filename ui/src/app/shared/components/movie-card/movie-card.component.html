<div class="movie-card">
  <div class="poster">
    <img [src]="movie!.posterUrl" [alt]="movie!.title" loading="lazy" />
    <div class="overlay">
      <button class="play-btn" *ngIf="!showRemove">
        <span>▶</span>
      </button>
      <button class="remove-btn" *ngIf="showRemove" (click)="onRemove()">
        <span>✕</span>
      </button>
    </div>
    <div class="rating-badge">
      <span class="star">★</span>{{ movie!.rating }}
    </div>
  </div>
  <div class="info">
    <h3 class="title">{{ movie!.title }}</h3>
    <p class="year">{{ movie!.year }}</p>
  </div>
</div>
